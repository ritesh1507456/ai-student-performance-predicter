<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Student Performance System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    .navbar {
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .navbar-brand {
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #00eaff, #00ff9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-link {
      color: #cbd5e1 !important;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-link:hover {
      color: #00eaff !important;
    }

    .main-container {
      min-height: 85vh;
      padding-top: 40px;
    }

    footer {
      background: #020617;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .data-particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #00eaff;
      border-radius: 50%;
      opacity: 0.7;
      animation: floatData 12s linear infinite;
    }

    @keyframes floatData {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    .page-animation {
      animation: fadePage 0.7s ease;
    }

    @keyframes fadePage {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">🧠 AI Academic System</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/"><i class="bi bi-house"></i> Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/dashboard"><i class="bi bi-graph-up"></i> Analytics</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/student_login"><i class="bi bi-person"></i> Student Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/login"><i class="bi bi-shield-lock"></i> Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <script>
    for (let i = 0; i < 25; i++) {
      let p = document.createElement("div");
      p.className = "data-particle";
      p.style.left = Math.random() * 100 + "%";
      p.style.animationDuration = (6 + Math.random() * 10) + "s";
      document.body.appendChild(p);
    }
  </script>

  <div class="container main-container page-animation">
    {% block content %}{% endblock %}
  </div>

  <footer class="text-center p-3">
    <p class="mb-0 text-secondary">© 2026 AI Student Performance System | Major Project</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
