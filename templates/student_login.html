{% extends "base.html" %}

{% block content %}
<style>
  .student-login-card {
    max-width: 420px;
    margin: auto;
    background: #020617;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 35px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    animation: fadeStudentLogin 0.6s ease;
  }

  @keyframes fadeStudentLogin {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .student-title {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, #00eaff, #00ffa6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 25px;
  }

  .form-control {
    background: #0f172a;
    border: 1px solid rgba(255,255,255,0.08);
    color: white;
  }

  .form-control:focus {
    background: #0f172a;
    color: white;
    border-color: #00eaff;
    box-shadow: none;
  }

  .student-btn {
    background: linear-gradient(90deg, #00eaff, #00ffa6);
    border: none;
    padding: 11px;
    font-weight: 600;
    color: black;
    transition: 0.3s;
  }

  .student-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,255,200,0.3);
  }

  .register-link {
    color: #00eaff;
    text-decoration: none;
  }

  .register-link:hover {
    text-decoration: underline;
  }
</style>

<div class="student-login-card">
  <h3 class="student-title">Student Login</h3>

  {% with messages = get_flashed_messages() %}
  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-danger">{{ message }}</div>
  {% endfor %}
  {% endif %}
  {% endwith %}

  <form method="POST" action="/student_login">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn student-btn w-100">Login</button>
    <div class="text-center mt-3">
      Don’t have an account? <a href="/student_register" class="register-link">Register Here</a>
    </div>
  </form>
</div>
{% endblock %}
